<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub 317</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;450;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Navigation progress bar -->
  <div id="progress-bar"></div>

  <div class="app-shell">

    <!-- ── Sidebar ─────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">

      <div class="sidebar-header">
        <a class="logo" href="#dashboard" id="logo-link">
          <span class="logo-icon">◈</span>
          <span class="logo-wordmark">Hub <em>317</em></span>
        </a>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Rendered by app.js -->
      </nav>

      <div class="sidebar-footer">
        <div class="status-indicator online" id="status-indicator">
          <span class="status-dot"></span>
          <span class="status-text">Online</span>
        </div>
      </div>

    </aside>

    <!-- ── Main Area ───────────────────────────────────── -->
    <div class="main-area">

      <header class="topbar">
        <div class="topbar-left">
          <h1 class="page-title" id="page-title">Dashboard</h1>
        </div>
        <div class="topbar-right">
          <div class="clock" id="clock">00:00</div>
          <button
            class="icon-btn"
            id="theme-toggle"
            title="Toggle theme"
            aria-label="Toggle theme"
          ></button>
        </div>
      </header>

      <main class="content" id="content">
        <!-- Rendered by app.js -->
      </main>

    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
